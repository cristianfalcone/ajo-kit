<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    const mode = localStorage.getItem('theme.v1')
    const dark = mode === 'dark' || (mode !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
    document.documentElement.classList.toggle('dark', dark)
    document.documentElement.style.visibility = 'hidden'
    document.addEventListener('DOMContentLoaded', () => document.documentElement.style.visibility = null)
  </script>
  <!-- ssr:head -->
</head>

<body class="h-full">
  <!-- ssr:data -->
  <noscript>
    This web doesn't work without JavaScript enabled.<br>
    Please enable it to continue.
  </noscript>
  <div id="root" class="h-full">
    <!-- ssr:root -->
  </div>
  <script src="/src/client" type="module"></script>
</body>

</html>
